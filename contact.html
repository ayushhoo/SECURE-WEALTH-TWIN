<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Contact — Product</title>
  <style>
    :root{--bg:#f7f9fc;--card:#ffffff;--accent:#0b67ff;--muted:#6b7280;--radius:8px}
    body{margin:0;font-family:Inter,Segoe UI,Arial,sans-serif;background:var(--bg);color:#0f1724}
    header{background:var(--card);padding:18px;border-bottom:1px solid #e6eef8}
    .container{max-width:700px;margin:28px auto;padding:0 20px}
    .card{background:var(--card);padding:18px;border-radius:var(--radius);box-shadow:0 1px 2px rgba(13,27,40,0.04)}
    label{display:block;margin-top:12px;font-size:0.95rem}
    input,textarea{width:100%;padding:10px;margin-top:6px;border:1px solid #e6eef8;border-radius:6px}
    button{margin-top:12px;background:var(--accent);color:#fff;border:none;padding:10px 14px;border-radius:6px;cursor:pointer}
    .hint{color:var(--muted);font-size:0.95rem}
    footer{margin:48px 0 24px;text-align:center;color:var(--muted)}
  </style>
</head>
<body>
  <header>
    <div class="container" style="display:flex;align-items:center">
      <div class="brand" style="font-weight:700;color:var(--accent)">Product</div>
      <nav role="navigation" aria-label="Main navigation" style="margin-left:auto">
        <a href="home.html">Home</a>
        <a href="team.html">Team</a>
        <a href="contact.html" aria-current="page">Contact</a>
      </nav>
    </div>
  </header>

  <main class="container" role="main">
    <article class="card" aria-labelledby="contact-heading">
      <h1 id="contact-heading">Contact</h1>
      <p class="hint">Use this page to contact the team or request more information about the product.</p>

      <form action="#" method="post" aria-label="Contact form" style="margin-top:12px">
        <label for="name">Name</label>
        <input id="name" name="name" type="text" required aria-required="true" />

        <label for="email">Email</label>
        <input id="email" name="email" type="email" required aria-required="true" />

        <label for="message">Message</label>
        <textarea id="message" name="message" rows="6" required aria-required="true"></textarea>

        <button type="submit">Send Message</button>
      </form>
    </article>
  </main>

  <footer role="contentinfo">
    <div class="container">
      <p style="margin:0;color:var(--muted)">© Product — Contact</p>
    </div>
  </footer>
</body>
</html>
