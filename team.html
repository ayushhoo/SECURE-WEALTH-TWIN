<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Team — Product</title>
  <style>
    :root{--bg:#f7f9fc;--card:#ffffff;--accent:#0b67ff;--muted:#6b7280;--radius:8px}
    body{margin:0;font-family:Inter,Segoe UI,Arial,sans-serif;background:var(--bg);color:#0f1724}
    header{background:var(--card);padding:18px;border-bottom:1px solid #e6eef8}
    .container{max-width:1000px;margin:28px auto;padding:0 20px}
    .team-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}
    .member{background:var(--card);padding:14px;border-radius:var(--radius);text-align:center;box-shadow:0 1px 2px rgba(13,27,40,0.04)}
    .avatar{width:72px;height:72px;border-radius:999px;background:#eef6ff;margin:0 auto 8px;display:flex;align-items:center;justify-content:center;color:var(--accent);font-weight:700}
    footer{margin:48px 0 24px;text-align:center;color:var(--muted)}
  </style>
</head>
<body>
  <header>
    <div class="container" style="display:flex;align-items:center">
      <div class="brand" style="font-weight:700;color:var(--accent)">Product</div>
      <nav role="navigation" aria-label="Main navigation" style="margin-left:auto">
        <a href="home.html">Home</a>
        <a href="team.html" aria-current="page">Team</a>
        <a href="contact.html">Contact</a>
      </nav>
    </div>
  </header>

  <main class="container" role="main">
    <h1>Team</h1>
    <p style="color:var(--muted)">Meet the core team members driving the product forward.</p>

    <section class="team-grid" aria-label="Team members" style="margin-top:12px">
      <div class="member" role="article" aria-labelledby="member1">
        <div class="avatar">AL</div>
        <h3 id="member1">Alex Lee</h3>
        <p style="color:var(--muted)">Chief Executive Officer</p>
      </div>

      <div class="member" role="article" aria-labelledby="member2">
        <div class="avatar">RM</div>
        <h3 id="member2">Rita Mills</h3>
        <p style="color:var(--muted)">Head of Engineering</p>
      </div>

      <div class="member" role="article" aria-labelledby="member3">
        <div class="avatar">JS</div>
        <h3 id="member3">J. Silva</h3>
        <p style="color:var(--muted)">Product Design Lead</p>
      </div>
    </section>
  </main>

  <footer role="contentinfo">
    <div class="container">
      <p style="margin:0;color:var(--muted)">© Product — Team</p>
    </div>
  </footer>
</body>
</html>
