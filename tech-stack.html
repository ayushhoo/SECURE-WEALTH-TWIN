<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Tech Stack — Product</title>
  <style>
    :root{--bg:#f7f9fc;--card:#ffffff;--accent:#0b67ff;--muted:#6b7280;--radius:8px}
    body{margin:0;font-family:Inter,Segoe UI,Arial,sans-serif;background:var(--bg);color:#0f1724}
    header{background:var(--card);padding:18px;border-bottom:1px solid #e6eef8}
    .container{max-width:900px;margin:28px auto;padding:0 20px}
    .chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
    .chip{background:#fff;padding:8px 10px;border-radius:999px;border:1px solid #e6eef8;color:var(--muted)}
    footer{margin:48px 0 24px;text-align:center;color:var(--muted)}
  </style>
</head>
<body>
  <header>
    <div class="container" style="display:flex;align-items:center">
      <div class="brand" style="font-weight:700;color:var(--accent)">Product</div>
      <nav role="navigation" aria-label="Main navigation" style="margin-left:auto">
        <a href="home.html">Home</a>
        <a href="tech-stack.html" aria-current="page">Tech Stack</a>
        <a href="security-engine.html">Security Engine</a>
      </nav>
    </div>
  </header>

  <main class="container" role="main">
    <h1>Tech Stack</h1>
    <p style="color:var(--muted)">Overview of technologies used across the product — frontend, backend, infrastructure, and security tooling.</p>

    <section aria-labelledby="frontend" style="margin-top:12px">
      <h2 id="frontend">Frontend</h2>
      <div class="chips" role="list">
        <span class="chip" role="listitem">HTML5</span>
        <span class="chip" role="listitem">CSS3</span>
        <span class="chip" role="listitem">JavaScript</span>
        <span class="chip" role="listitem">React</span>
      </div>
    </section>

    <section aria-labelledby="backend" style="margin-top:12px">
      <h2 id="backend">Backend & Infrastructure</h2>
      <div class="chips" role="list">
        <span class="chip" role="listitem">Node.js</span>
        <span class="chip" role="listitem">Express</span>
        <span class="chip" role="listitem">PostgreSQL</span>
        <span class="chip" role="listitem">Docker</span>
      </div>
    </section>
  </main>

  <footer role="contentinfo">
    <div class="container">
      <p style="margin:0;color:var(--muted)">© Product — Tech Stack</p>
    </div>
  </footer>
</body>
</html>
